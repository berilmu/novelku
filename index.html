<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Novel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <h1>📖 Novel</h1>
    <div id="list">Loading...</div>
  </main>

  <script>
    const URL = "https://YOUR_PROJECT.supabase.co/rest/v1/novels";
    const KEY = "YOUR_ANON_KEY";

    async function load() {
      const res = await fetch(URL, {
        headers: { apikey: KEY, Authorization: `Bearer ${KEY}` }
      });

      const data = await res.json();
      const el = document.getElementById("list");

      el.innerHTML = "";

      data.forEach(n => {
        el.innerHTML += `
          <div class="card">
            <h2>${n.title}</h2>
            <p>${n.description || ""}</p>
            <button onclick="openNovel(${n.id})">Baca</button>
          </div>
        `;
      });
    }

    function openNovel(id) {
      location.href = `reader.html?novel=${id}`;
    }

    load();
  </script>

</body>
</html>
